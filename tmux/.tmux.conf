unbind r
bind r source-file ~/Neu-Alkemy/tmux/.tmux.conf

set -g prefix C-a

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key w kill-pane
bind-key b break-pane
bind-key j join-pane
bind-key v split-window -h
bind-key h split-window -v
bind-key t resize-pane -Z

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R


set-option -g status-position top
set -g mouse off

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Neu Alkemy — Custom status bar
set -g status-style "bg=default,fg=#B8BDD0"
set -g status-left ""
set -g status-right-length 100
set -g status-left-length 100
set -g status-right "#[fg=#B07CC6]%m-%d #[fg=#585B70]<<>> #[fg=#C4A7E7]%I:%M %p"

# Window status
set -g window-status-format "#[fg=#7F849C] #(~/Neu-Alkemy/tmux/window-icon.sh #{pane_current_command}) "
set -g window-status-current-format "#[fg=#B07CC6,bold] #(~/Neu-Alkemy/tmux/window-icon.sh #{pane_current_command}) "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#45475A"
set -g pane-active-border-style "fg=#B07CC6"

# Message bar
set -g message-style "bg=#313244,fg=#D4D8F0"
set -g message-command-style "bg=#313244,fg=#D4D8F0"
