"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$elixir\
$cmd_duration\
$line_break\
$character
"""

palette = 'catppuccin_mocha'

[directory]
style = "bold blue"
format = "[$path]($style) "
truncation_length = 2
truncation_symbol = ""
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Pictures" = " "
"Neu-Alkemy" = "⚗️ "
"Jump" = "🍏"

[git_branch]
symbol = "  "
style = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([$all_status $ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count} ⇣${behind_count}"
conflicted = "=${count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[elixir]
symbol = " "
style = "bold lavender"
format = '[$symbol$version \(OTP $otp_version\)]($style) '

[nodejs]
symbol = " "
style = "bold green"
format = '[$symbol$version]($style) '

[c]
symbol = " "
style = "bold green"
format = '[$symbol$version]($style) '

[rust]
symbol = " "
style = "bold peach"
format = '[$symbol$version]($style) '

[golang]
symbol = " "
style = "bold sky"
format = '[$symbol$version]($style) '

[php]
symbol = " "
style = "bold green"
format = '[$symbol$version]($style) '

[java]
symbol = " "
style = "bold red"
format = '[$symbol$version]($style) '

[kotlin]
symbol = " "
style = "bold mauve"
format = '[$symbol$version]($style) '

[haskell]
symbol = " "
style = "bold mauve"
format = '[$symbol$version]($style) '

[python]
symbol = " "
style = "bold yellow"
format = '[$symbol$version(\($virtualenv\))]($style) '

[docker_context]
symbol = " "
style = "bold sapphire"
format = '[$symbol$context]($style) '

[line_break]
disabled = false

[character]
success_symbol = '[I ❯](bold green)'
error_symbol = '[I ❯](bold red)'
vimcmd_symbol = '[N ❮](bold blue)'
vimcmd_replace_one_symbol = '[❮](bold lavender)'
vimcmd_replace_symbol = '[❮](bold lavender)'
vimcmd_visual_symbol = '[❮](bold yellow)'

[cmd_duration]
min_time = 2000
format = '[took $duration](bold overlay1)'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
