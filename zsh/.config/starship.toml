"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$elixir\
$cmd_duration\
$line_break\
$character
"""

palette = 'neu_alkemy'

[directory]
style = "bold blue"
format = "[$path]($style) "
truncation_length = 2
truncation_symbol = ""
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Pictures" = " "
"Neu-Alkemy" = "⚗️ "
"Jump" = "🌊"

[git_branch]
symbol = "  "
style = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([$all_status $ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count} ⇣${behind_count}"
conflicted = "=${count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[elixir]
symbol = " "
style = "bold lavender"
format = '[$symbol$version \(OTP $otp_version\)]($style) '

[nodejs]
symbol = " "
style = "bold green"
format = '[$symbol$version]($style) '

[c]
symbol = " "
style = "bold green"
format = '[$symbol$version]($style) '

[rust]
symbol = " "
style = "bold peach"
format = '[$symbol$version]($style) '

[golang]
symbol = " "
style = "bold sky"
format = '[$symbol$version]($style) '

[php]
symbol = " "
style = "bold green"
format = '[$symbol$version]($style) '

[java]
symbol = " "
style = "bold red"
format = '[$symbol$version]($style) '

[kotlin]
symbol = " "
style = "bold mauve"
format = '[$symbol$version]($style) '

[haskell]
symbol = " "
style = "bold mauve"
format = '[$symbol$version]($style) '

[python]
symbol = " "
style = "bold yellow"
format = '[$symbol$version(\($virtualenv\))]($style) '

[docker_context]
symbol = " "
style = "bold sapphire"
format = '[$symbol$context]($style) '

[line_break]
disabled = false

[character]
success_symbol = '[I ❯](bold green)'
error_symbol = '[I ❯](bold red)'
vimcmd_symbol = '[N ❮](bold blue)'
vimcmd_replace_one_symbol = '[❮](bold lavender)'
vimcmd_replace_symbol = '[❮](bold lavender)'
vimcmd_visual_symbol = '[❮](bold yellow)'

[cmd_duration]
min_time = 2000
format = '[took $duration](bold overlay1)'

[palettes.neu_alkemy]
rosewater = "#E8D5D0"
flamingo = "#D5A6A6"
pink = "#DBA8D4"
mauve = "#B07CC6"
red = "#E05A5A"
maroon = "#D4727A"
peach = "#D9A076"
yellow = "#E0C06E"
green = "#8FBF9A"
teal = "#8AC5C0"
sky = "#89B8D4"
sapphire = "#7EAAF0"
blue = "#7C6FE0"
lavender = "#C4A7E7"
text = "#D4D8F0"
subtext1 = "#B8BDD0"
subtext0 = "#A0A5B8"
overlay2 = "#9399B2"
overlay1 = "#7F849C"
overlay0 = "#6C7086"
surface2 = "#585B70"
surface1 = "#45475A"
surface0 = "#313244"
base = "#1E1E2E"
mantle = "#181825"
crust = "#11111B"
